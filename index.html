<!DOCTYPE html>
<html lang="en">
<head>
  <title>Katie Worton</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href=".\font-awesome-4.6.3\css\font-awesome.min.css">
  <link rel="stylesheet" href="http://maxcdn.bootstrapcdn.com/bootstrap/3.3.5/css/bootstrap.min.css">
  <link href='https://fonts.googleapis.com/css?family=PT+Mono' rel='stylesheet' type='text/css'>
  <!-- favicon to add -->
</head>
<style>
* {
	font-family: 'PT Mono', sans-serif;
	font-weight:bold;
    font-size: auto;
    line-height: 0%;
    text-decoration: none;
}

html, body { margin: 0; padding: 0; }

body {
	text-align: center;
	background-color:#F9FFFF; /* FFEBDE */
    text-decoration: none;
;
}

::selection {
  background: pink; /* WebKit/Blink Browsers */
}
::-moz-selection {
  background: pink; /* Gecko Browsers */
}

a:hover {
	color:#80d4ff; 
    text-decoration: none;
}

.contain {

	position: absolute;
	background-color:#F9FFFF; /*box behind text*/
	padding-left:0.5em;
	padding-right:0.5em;
	top:48%;
	margin: auto;
    /*vertical-align: middle;*/
    transform: translate(-50%,-50%);
	margin-left:auto;

    
	display: inline-block;
}
    <div class="row">
    <div class="col-xs-6 col-md-4 col-lg-2 vcenter">
        <div style="height:10em;border:1px solid #000">Big</div>
    </div><!--
    --><div class="col-xs-6 col-md-8 col-lg-10 vcenter">
        <div style="height:3em;border:1px solid #F00">Small</div>
    </div>
</div>

h2 {
	line-height:20%;
}

h1, h2, h3, h4 {
	padding:0px;
	margin:0px;

}

h1, h2 { /* heading */
	font-size:6em;
    line-height: 85%;
}

h3 {
	font-size:3.3em;
	line-height:90%;
}

h4 {
   font-size:3em;
   line-height:0.9;
}
.dark {
	color:#393130;
}

.light {
	color:#F40034;
}

.grey {
	background-color:turquoise; /* bar */
	position:absolute;
	margin:0;
	width:100%;
	top:48%;
	margin-top:-80px;
	height:180px;
	opacity:0.6;
}

@media (max-width: 600px) {

h2 {
	line-height:0.9;
}

h1, h2 {
	font-size:4em;
}

h3 {
	font-size:2.2em;

}

h4 {
   font-size:2em;
   line-height:0.6;
}

.contain {
	margin-left:-190px;
}

.grey { 
	height:120px;
}
}

@media (max-width:390px) {

h2 {
	line-height:0.5;
}

h1, h2 {
	font-size:3em;
}

h3 {
	font-size:1.6em;
	line-height:1.4;
}

h4 {
   font-size:1.4em;
   line-height:0.6;
}

.contain {
	margin-left:-145px;
}

.grey { 
	height:80px;
}
}
</style>
<body>
<div class="grey">
</div>
<div class="contain">
<h1><span class="dark">KATIE</span><span class="light">WORTON</span></h1>
<h2><a class="dark" href="#">CV</a><span class="light">OR</span><a class="dark" href="#">BEHANCE</a></h2>
<h3><span class="dark">CS</span><span class="light">STUDENT</span><span class="dark">AT</span><span class="light">EDINBURGH</span></h3>
<h4><a class="dark" href="#">Email</a><a class="light" href="#">GitHub</a></h4>
</div>
</body>
</html>
